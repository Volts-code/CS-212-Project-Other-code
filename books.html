<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library System</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>
    <header class="navbar">
        <h2>My Library</h2>

        <div class="navmenu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="books.html">Books</a></li>
                <li><a href="statistics.html">Statistics</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
        
    </header>

    <div class="container">
        <h1>Books Collection</h1>
        <input type="text" id="search" placeholder="Search by title, author, or genre">


        <div class="sort">

            <label>Sort:</label>
            <select id="sort">
                <option value="">None</option>
                <option value="title">Title</option>
                <option value="author">Author</option>
            </select>

        </div>


        <div class="dashboard">
        <h3>Dashboard</h3>

            <p>Total Books: <span id="totalBooks"></span></p>
            <p>Borrowed Books: <span id="borrowedBooks"></span></p>
            <p>Overdue Books: <span id="overdueBooks"></span></p>

        </div>


        <h2>Available Books</h2>
        <div id="bookList"></div>


        <h2>Borrowed Books</h2>
        <div id="borrowedList"></div>

    </div>


    <footer class="footer">
    <p>Library Management System | Student Project</p>
    </footer>


    <script src="app.js"></script>
</body>

</html>
